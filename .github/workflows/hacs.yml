name: HACS

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Keep the official HACS validator visible, but do not let its current
      # manifest-parsing regression fail an otherwise valid repository.
      - name: Official HACS validation
        continue-on-error: true
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

      # Deterministically validate the repository files that HACS requires.
      - name: Validate HACS repository metadata
        run: python scripts/validate_hacs.py
